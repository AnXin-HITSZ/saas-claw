image:
  repository: crpi-li78f6lp5zheaj11.cn-shenzhen.personal.cr.aliyuncs.com/saas-claw/mysql
  tag: "8.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3306

mysql:
  database: claw_saas_runtime
  databases:
    runtime: claw_saas_runtime
    control: claw_saas_control
  user: saas_claw
  auth:
    createSecret: false
    existingSecret: saas-claw-mysql-secret
    rootPasswordKey: MYSQL_ROOT_PASSWORD
    databaseKey: MYSQL_DATABASE
    userKey: MYSQL_USER
    passwordKey: MYSQL_PASSWORD

bootstrap:
  enabled: true
  backoffLimit: 6
  annotations: {}

config:
  characterSetServer: utf8mb4
  collationServer: utf8mb4_unicode_ci

persistence:
  enabled: true
  storageClassName: ""
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
