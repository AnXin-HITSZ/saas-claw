{{- $svc := index .Values "runtime-service" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-runtime-service
  labels:
    {{- include "saas-claw.labels" . | nindent 4 }}
    app.kubernetes.io/name: runtime-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime-service
        app.kubernetes.io/part-of: saas-claw
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: runtime-service
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-shared-config
            - secretRef:
                name: {{ .Values.global.secretName }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-service
  labels:
    app.kubernetes.io/name: runtime-service
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app.kubernetes.io/name: runtime-service
