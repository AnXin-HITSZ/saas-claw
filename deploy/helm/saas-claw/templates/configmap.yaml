apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-shared-config
  labels:
    {{- include "saas-claw.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.shared.datasourceUrl | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.shared.datasourceUsername | quote }}
  SPRING_JPA_DDL_AUTO: {{ .Values.shared.jpaDdlAuto | quote }}
  SPRING_DATA_REDIS_HOST: {{ .Values.shared.redisHost | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.shared.redisPort | quote }}
