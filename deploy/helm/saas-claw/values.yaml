global:
  imagePullSecret: aliyun-acr-pull-secret
  secretName: saas-claw-secret

shared:
  datasourceUrl: "jdbc:mysql://saas-claw-mysql:3306/claw_saas_control?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai"
  datasourceUsername: saas_claw
  jpaDdlAuto: update
  redisHost: redis-master
  redisPort: "6379"

redis:
  image:
    repository: saas-claw/redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  maxmemory: 256mb
  persistence:
    size: 1Gi

gateway:
  image:
    repository: saas-claw/gateway
    tag: latest
    pullPolicy: IfNotPresent

backend-for-frontend:
  image:
    repository: saas-claw/backend-for-frontend
    tag: latest
    pullPolicy: IfNotPresent

claw-service:
  image:
    repository: saas-claw/claw-service
    tag: latest
    pullPolicy: IfNotPresent

runtime-service:
  image:
    repository: saas-claw/runtime-service
    tag: latest
    pullPolicy: IfNotPresent

agent-marketplace-service:
  image:
    repository: saas-claw/agent-marketplace-service
    tag: latest
    pullPolicy: IfNotPresent

billing-service:
  image:
    repository: saas-claw/billing-service
    tag: latest
    pullPolicy: IfNotPresent

skill-marketplace-service:
  image:
    repository: saas-claw/skill-marketplace-service
    tag: latest
    pullPolicy: IfNotPresent

control-plane:
  image:
    repository: saas-claw/control-plane
    tag: latest
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: saas.claw.anxin-hitsz.com
      paths:
        - path: /api
          pathType: Prefix
        - path: /actuator
          pathType: Prefix
  tls:
    - secretName: saas-claw-tls
      hosts:
        - saas.claw.anxin-hitsz.com
