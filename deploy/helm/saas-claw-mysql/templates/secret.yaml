{{- if and .Values.mysql.auth.createSecret (not .Values.mysql.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "saas-claw-mysql.secretName" . }}
  labels:
    {{- include "saas-claw-mysql.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.mysql.auth.rootPasswordKey }}: {{ required "mysql.auth.values.rootPassword is required when mysql.auth.createSecret=true" .Values.mysql.auth.values.rootPassword | quote }}
  {{ .Values.mysql.auth.databaseKey }}: {{ .Values.mysql.database | quote }}
  {{ .Values.mysql.auth.userKey }}: {{ .Values.mysql.user | quote }}
  {{ .Values.mysql.auth.passwordKey }}: {{ required "mysql.auth.values.password is required when mysql.auth.createSecret=true" .Values.mysql.auth.values.password | quote }}
{{- end }}
