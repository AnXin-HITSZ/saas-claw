{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "saas-claw-mysql.fullname" . }}-bootstrap-databases
  labels:
    {{- include "saas-claw-mysql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.bootstrap.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "saas-claw-mysql.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mysql-bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "saas-claw-mysql.secretName" . }}
                  key: {{ .Values.mysql.auth.rootPasswordKey }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "saas-claw-mysql.secretName" . }}
                  key: {{ .Values.mysql.auth.passwordKey }}
          command:
            - sh
            - -c
            - |
              set -eu
              host='{{ include "saas-claw-mysql.fullname" . }}'
              until mysqladmin ping -h "$host" -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
                sleep 2
              done
              mysql -h "$host" -uroot -p"$MYSQL_ROOT_PASSWORD" <<SQL
              CREATE DATABASE IF NOT EXISTS {{ .Values.mysql.databases.runtime }} CHARACTER SET {{ .Values.config.characterSetServer }} COLLATE {{ .Values.config.collationServer }};
              CREATE DATABASE IF NOT EXISTS {{ .Values.mysql.databases.control }} CHARACTER SET {{ .Values.config.characterSetServer }} COLLATE {{ .Values.config.collationServer }};
              CREATE USER IF NOT EXISTS '{{ .Values.mysql.user }}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
              GRANT ALL PRIVILEGES ON {{ .Values.mysql.databases.runtime }}.* TO '{{ .Values.mysql.user }}'@'%';
              GRANT ALL PRIVILEGES ON {{ .Values.mysql.databases.control }}.* TO '{{ .Values.mysql.user }}'@'%';
              FLUSH PRIVILEGES;
              SQL
{{- end }}
