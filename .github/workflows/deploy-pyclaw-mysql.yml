name: Deploy pyclaw MySQL

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy MySQL chart to ECS K3s
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "REF_NAME='${REF_NAME}' COMMIT_SHA='${COMMIT_SHA}' bash -se" <<'REMOTE_SCRIPT'
          cd /opt/saas-claw
          rm -f .git/index.lock
          git fetch origin "${REF_NAME}"
          git reset --hard "${COMMIT_SHA}"
          test -f claw-saas-mysql-values-k3s.example.yaml

          echo "== MySQL chart template =="
          grep -n "CREATE DATABASE\|GRANT ALL" deploy/helm/claw-saas-mysql/templates/bootstrap-databases-job.yaml

          echo "== Cleanup previous bootstrap job =="
          sudo /usr/local/bin/k3s kubectl -n saas-claw delete job claw-saas-mysql-bootstrap-databases --ignore-not-found

          echo "== Deploy pyclaw-mysql =="
          set +e
          sudo helm --kubeconfig /etc/rancher/k3s/k3s.yaml upgrade --install claw-saas-mysql ./deploy/helm/claw-saas-mysql \
            -n saas-claw \
            --create-namespace \
            -f claw-saas-mysql-values-k3s.example.yaml \
            --timeout 15m &
          helm_pid=$!
          set -e

          while kill -0 "${helm_pid}" 2>/dev/null; do
            echo "$(date -Is) waiting for claw-saas-mysql helm upgrade..."
            sleep 30
          done

          wait "${helm_pid}"

          echo "== Verify MySQL databases =="
          sudo /usr/local/bin/k3s kubectl -n saas-claw exec statefulset/claw-saas-mysql -- \
            sh -c 'mysql -h 127.0.0.1 -upyclaw -p"$MYSQL_PASSWORD" -e "show databases;"'
          REMOTE_SCRIPT
