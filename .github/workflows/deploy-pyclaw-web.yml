name: Deploy pyclaw Web

on:
  push:
    branches:
      - main
    paths:
      - "pyclaw-web/**"
      - "pyclaw-web-values-k3s.yaml"
      - ".github/workflows/deploy-pyclaw-web.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pyclaw/pyclaw-web
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push pyclaw-web image
        uses: docker/build-push-action@v6
        with:
          context: ./pyclaw-web
          file: ./pyclaw-web/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS K3s
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "
            cd /opt/pyclaw &&
            rm -f .git/index.lock &&
            git fetch origin ${{ github.ref_name }} &&
            git reset --hard ${{ github.sha }} &&
            sudo helm --kubeconfig /etc/rancher/k3s/k3s.yaml upgrade --install pyclaw-web ./pyclaw-web/helm \
              -n pyclaw \
              --create-namespace \
              -f pyclaw-web-values-k3s.yaml \
              --set image.repository=${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set image.tag=${{ env.IMAGE_TAG }}
          "
