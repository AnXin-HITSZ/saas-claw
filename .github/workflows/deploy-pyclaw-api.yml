name: Deploy pyclaw API

on:
  push:
    branches:
      - main
    paths:
      - "openclaw/**"
      - "helm/pyclaw/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".dockerignore"
      - "pyclaw-api-ingressqueue-mysql-values-k3s.yaml"
      - ".github/workflows/deploy-pyclaw-api.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pyclaw/pyclaw-api
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push pyclaw-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS K3s
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "
            cd /opt/pyclaw &&
            git fetch origin ${{ github.ref_name }} &&
            git reset --hard ${{ github.sha }} &&
            sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install pyclaw ./helm/pyclaw \
              -n pyclaw \
              --create-namespace \
              -f pyclaw-values-k3s.yaml \
              -f pyclaw-api-ingressqueue-mysql-values-k3s.yaml \
              --set-string image.repository=${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set-string image.tag=${{ env.IMAGE_TAG }}
          "
