name: Deploy Spring Backend

on:
  push:
    branches:
      - main
    paths:
      - "spring-backend/**"
      - ".github/workflows/deploy-spring-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pyclaw/spring-backend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push spring-backend image
        uses: docker/build-push-action@v6
        with:
          context: ./spring-backend
          file: ./spring-backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS K3s
        env:
          IMAGE_REPOSITORY: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "
            cd /opt/pyclaw &&
            rm -f .git/index.lock &&
            git fetch origin ${{ github.ref_name }} &&
            git reset --hard ${{ github.sha }} &&
            sudo helm --kubeconfig /etc/rancher/k3s/k3s.yaml upgrade --install spring-backend ./spring-backend/helm \
              -n pyclaw \
              --create-namespace \
              -f spring-values-k3s.yaml \
              --set-string image.repository=${IMAGE_REPOSITORY} \
              --set-string image.tag=${{ env.IMAGE_TAG }}
          "
