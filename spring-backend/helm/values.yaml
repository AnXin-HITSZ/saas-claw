replicaCount: 1

deploymentStrategy:
  type: Recreate

image:
  repository: spring-backend
  tag: dev
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    - host: api.anxin-hitsz.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  SPRING_DATASOURCE_URL: jdbc:mysql://pyclaw-mysql:3306/pyclaw_control?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  SPRING_DATASOURCE_USERNAME: pyclaw
  SPRING_JPA_DDL_AUTO: update
  PYCLAW_BASE_URL: http://pyclaw.pyclaw.svc.cluster.local:8000
  BOOTSTRAP_ADMIN_USERNAME: admin
  PYCLAW_SANDBOX_ENABLED: "false"
  PYCLAW_SANDBOX_NAMESPACE_PREFIX: pyclaw-user
  PYCLAW_SANDBOX_RUNNER_IMAGE: ""
  PYCLAW_SANDBOX_RUNNER_IMAGE_PULL_POLICY: IfNotPresent
  PYCLAW_SANDBOX_RUNNER_PORT: "8000"
  PYCLAW_SANDBOX_WORKSPACE_MOUNT_PATH: /workspace
  PYCLAW_SANDBOX_PVC_STORAGE_SIZE: 1Gi
  PYCLAW_SANDBOX_PVC_STORAGE_CLASS_NAME: ""
  PYCLAW_SANDBOX_CPU_REQUEST: 100m
  PYCLAW_SANDBOX_MEMORY_REQUEST: 256Mi
  PYCLAW_SANDBOX_CPU_LIMIT: 500m
  PYCLAW_SANDBOX_MEMORY_LIMIT: 768Mi
  PYCLAW_SANDBOX_SERVICE_ACCOUNT_NAME: default
  PYCLAW_SANDBOX_IMAGE_PULL_SECRET_NAME: ""
  PYCLAW_SANDBOX_IMAGE_PULL_SECRET_SOURCE_NAMESPACE: ""

secret:
  create: true
  existingSecret: ""
  values:
    SPRING_DATASOURCE_PASSWORD: ""
    JWT_SIGNING_SECRET: ""
    BOOTSTRAP_ADMIN_PASSWORD: ""
    PYCLAW_API_TOKEN: ""
    PYCLAW_INTERNAL_API_TOKEN: ""

persistence:
  enabled: false
  storageClassName: ""
  size: 2Gi
  mountPath: /data


probes:
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  liveness:
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
  startup:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
