{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pyclaw.fullname" . }}-channel-worker
  labels:
    {{- include "pyclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "pyclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: channel-worker
  template:
    metadata:
      labels:
        {{- include "pyclaw.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: channel-worker
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pyclaw.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: channel-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - openclaw.channels.worker_app
          args:
            - --poll-interval-seconds
            - {{ .Values.worker.pollIntervalSeconds | quote }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "pyclaw.fullname" . }}-config
            - secretRef:
                name: {{ include "pyclaw.secretName" . }}
                optional: true
          env:
            - name: OPENCLAW_CHANNEL_WORKER_CHANNELS
              value: {{ .Values.worker.channels | quote }}
            - name: OPENCLAW_CHANNEL_WORKER_OWNER_ID
              value: {{ .Values.worker.ownerId | quote }}
            - name: OPENCLAW_CHANNEL_WORKER_LOG_LEVEL
              value: {{ .Values.worker.logLevel | quote }}
            {{- if and .Values.ingressQueue.enabled .Values.ingressQueue.mysql.dsnSecretName }}
            - name: OPENCLAW_INGRESS_QUEUE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ingressQueue.mysql.dsnSecretName }}
                  key: {{ .Values.ingressQueue.mysql.dsnSecretKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: chatdata
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: chatdata
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pyclaw.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
